<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VC Tracker - 投资热度追踪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .controls {
            padding: 20px;
            background: #f8f9fa;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        input, select {
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            min-width: 200px;
        }
        .table-container {
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #495057;
            color: white;
            padding: 15px;
            text-align: left;
            position: sticky;
            top: 0;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        tr:hover { background: #f8f9fa; }
        .source-tag {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        .source-PaulGraham { background: #e8f5e9; color: #2e7d32; }
        .source-HackerNews { background: #fff3e0; color: #ef6c00; }
        a { color: #667eea; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .loading { text-align: center; padding: 60px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>VC Tracker</h1>
            <p>VC投资热度追踪器 | Hacker News & Paul Graham</p>
        </div>
        
        <div class="controls">
            <select id="source-filter" onchange="filterData()">
                <option value="all">全部来源</option>
                <option value="Paul Graham">Paul Graham</option>
                <option value="Hacker News">Hacker News</option>
            </select>
            <input type="text" id="search" placeholder="搜索标题..." onkeyup="filterData()">
        </div>
        
        <div class="table-container">
            <div id="loading" class="loading">加载中...</div>
            <table id="news-table" style="display:none;">
                <thead>
                    <tr>
                        <th>来源</th>
                        <th>标题</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let allData = [];
        
        async function loadData() {
            try {
                const response = await fetch('data.json');
                allData = await response.json();
                filterData();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('news-table').style.display = 'table';
            } catch (e) {
                document.getElementById('loading').innerHTML = '加载失败，请刷新重试';
            }
        }
        
        function filterData() {
            const source = document.getElementById('source-filter').value;
            const search = document.getElementById('search').value.toLowerCase();
            
            let filtered = allData;
            if (source !== 'all') {
                filtered = filtered.filter(item => item.source === source);
            }
            if (search) {
                filtered = filtered.filter(item => 
                    item.title.toLowerCase().includes(search)
                );
            }
            
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = filtered.map(item => `
                <tr>
                    <td><span class="source-tag source-${item.source.replace(/\s/g, '')}">${item.source}</span></td>
                    <td><a href="${item.url}" target="_blank">${item.title}</a></td>
                    <td>${item.publish_time ? item.publish_time.slice(0, 10) : ''}</td>
                </tr>
            `).join('');
        }
        
        loadData();
    </script>
</body>
</html>
